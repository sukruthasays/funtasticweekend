<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funtastic Weekend! 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap');

  :root {
    --sky:        #B8DDF0;
    --sky-light:  #DFF0FA;
    --sky-deep:   #6AAFD4;
    --cream:      #FEF6ED;
    --rose:       #F2AABB;
    --teal:       #7ECEC4;
    --sage:       #9DC88D;
    --sun:        #F9D76B;
    --lavender:   #C4B5E8;
    --coral:      #F4A875;
    --ink:        #3A5068;
    --ink-light:  #6B8CA3;
    --warm-white: #FFFCF7;
    --cloud:      rgba(255,255,255,0.65);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #DFF0FA 0%, #FEF6ED 32%, #FEF6ED 100%);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(170deg, #C5E8F7 0%, #A8D8F0 55%, #C8E9F5 100%);
    padding: 28px 20px 52px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  /* cloud blobs */
  header::before {
    content: '';
    position: absolute;
    top: 8px; left: -50px;
    width: 260px; height: 110px;
    background: var(--cloud);
    border-radius: 50%;
    filter: blur(28px);
    pointer-events: none;
  }

  /* soft curved bottom edge like a cloud */
  .header-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 36px;
    overflow: hidden;
    line-height: 0;
  }
  .header-bottom svg { display: block; width: 100%; height: 36px; }

  .site-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.6rem);
    color: var(--ink);
    letter-spacing: 1px;
    text-shadow: 3px 3px 0 rgba(255,255,255,0.55), 5px 5px 0 rgba(58,80,104,0.12);
    display: inline-block;
    position: relative;
    transform: rotate(-0.5deg);
    z-index: 1;
  }

  .site-subtitle {
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 1.25rem;
    color: var(--ink-light);
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }

  /* ── Deco strip ── */
  .deco-strip {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 20px;
    background: var(--warm-white);
    border-bottom: 1.5px solid rgba(136,196,225,0.3);
    flex-wrap: wrap;
    gap: 6px;
  }
  .deco-strip svg { width: 48px; height: 48px; }

  /* ── Controls bar ── */
  .controls {
    background: rgba(222,241,252,0.75);
    border-bottom: 1.5px solid rgba(136,196,225,0.3);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }

  .controls input, .controls select {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border: 2px solid rgba(110,175,212,0.45);
    border-radius: 22px;
    padding: 7px 14px;
    background: white;
    outline: none;
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(58,80,104,0.07);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .controls input:focus, .controls select:focus {
    border-color: var(--teal);
    box-shadow: 0 2px 12px rgba(126,206,196,0.22);
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    letter-spacing: 0.4px;
    border: none;
    border-radius: 22px;
    padding: 8px 18px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(58,80,104,0.14);
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
    display: inline-block;
  }
  .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(58,80,104,0.18); }
  .btn:active { transform: translateY(0);    box-shadow: 0 2px 6px rgba(58,80,104,0.1); }

  .btn-yellow  { background: var(--sun);      color: var(--ink); }
  .btn-teal    { background: var(--teal);     color: white; }
  .btn-orange  { background: var(--coral);    color: white; }
  .btn-green   { background: var(--sage);     color: var(--ink); }
  .btn-red     { background: var(--rose);     color: var(--ink); }
  .btn-purple  { background: var(--lavender); color: var(--ink); }

  /* ── Main layout ── */
  .main-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
  }
  @media (max-width: 768px) {
    .main-wrap { grid-template-columns: 1fr; }
  }

  /* ── Events list ── */
  #events-count {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.35rem;
    color: var(--ink-light);
    margin-bottom: 14px;
  }

  #events-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .event-card {
    background: var(--warm-white);
    border: 1.5px solid rgba(169,210,235,0.45);
    border-radius: 22px;
    padding: 16px 18px;
    box-shadow: 0 4px 20px rgba(58,80,104,0.08), 0 1px 4px rgba(58,80,104,0.05);
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .event-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(58,80,104,0.13);
  }

  .event-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 6px; height: 100%;
    background: var(--stripe-color, var(--teal));
    border-radius: 22px 0 0 22px;
    opacity: 0.65;
  }

  .event-card[data-source="Ronnies Awesome List"]                      { --stripe-color: var(--rose); }
  .event-card[data-source="Marin Mommies"]                             { --stripe-color: var(--lavender); }
  .event-card[data-source="SF Funcheap"]                               { --stripe-color: var(--coral); }
  .event-card[data-source="510 Families"]                              { --stripe-color: var(--sage); }
  .event-card[data-source="SFPL Kids Events"]                          { --stripe-color: var(--sky-deep); }
  .event-card[data-source="Manual"]                                    { --stripe-color: var(--sun); }
  .event-card[data-source="DSE Runners"]                               { --stripe-color: #E8A0A0; }
  .event-card[data-source="Exploratorium"]                             { --stripe-color: var(--teal); }
  .event-card[data-source="Family Adventure Squad/Mommy & Me Hiking"]  { --stripe-color: var(--sage); }
  .event-card[data-source="Chabot Space & Science Center"]             { --stripe-color: var(--sky-deep); }
  .event-card[data-source="Lawrence Hall of Science"]                  { --stripe-color: var(--lavender); }

  .event-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-left: 12px;
  }

  .event-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--ink);
    line-height: 1.3;
    flex: 1;
  }
  .event-title a { color: inherit; text-decoration: none; }
  .event-title a:hover { color: var(--sky-deep); text-decoration: underline wavy var(--rose); }

  .event-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 8px 0 6px 12px;
  }
  .tag {
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    border: 1px solid rgba(58,80,104,0.12);
    border-radius: 20px;
    padding: 2px 10px;
    display: inline-block;
  }
  .tag-date     { background: rgba(249,215,107,0.3);  color: #7A6000; }
  .tag-location { background: rgba(126,206,196,0.25); color: #2A6B66; }
  .tag-region   { background: rgba(136,196,225,0.3);  color: #205A7A; }
  .tag-source   { background: rgba(242,170,187,0.3);  color: #8A3050; }
  .tag-category { background: rgba(157,200,141,0.3);  color: #3A6830; }

  .event-desc {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--ink-light);
    margin: 6px 0 0 12px;
  }

  .event-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-gcal {
    font-size: 0.72rem;
    text-decoration: none;
    background: rgba(136,196,225,0.18);
    color: var(--ink);
    border: 1px solid rgba(136,196,225,0.45);
    border-radius: 12px;
    padding: 3px 8px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .event-card:hover .btn-gcal { opacity: 1; }
  .btn-gcal:hover { background: rgba(136,196,225,0.35); }
  .btn-delete {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.15rem;
    opacity: 0.28;
    transition: opacity 0.15s;
    padding: 2px 6px;
    color: var(--ink);
  }
  .btn-delete:hover { opacity: 0.75; }

  /* ── Sidebar ── */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }

  .sidebar-card {
    background: var(--warm-white);
    border: 1.5px solid rgba(169,210,235,0.45);
    border-radius: 22px;
    padding: 18px;
    box-shadow: 0 4px 20px rgba(58,80,104,0.07);
  }

  .sidebar-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    margin-bottom: 14px;
    color: var(--ink);
  }

  /* Add event form */
  .form-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
  }
  .form-field label {
    font-family: 'Caveat', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink-light);
  }
  .form-field input, .form-field textarea, .form-field select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    border: 2px solid rgba(136,196,225,0.45);
    border-radius: 12px;
    padding: 6px 10px;
    outline: none;
    background: white;
    color: var(--ink);
  }
  .form-field input:focus, .form-field textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(126,206,196,0.15);
  }
  .form-field textarea { resize: vertical; min-height: 60px; }

  /* Sources legend */
  .source-legend { display: flex; flex-direction: column; gap: 8px; }
  .source-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer;
    user-select: none;
    color: var(--ink);
  }
  .source-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(58,80,104,0.18);
    flex-shrink: 0;
  }

  .sources-h3 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .sources-h3 .sources-arrow {
    font-size: 0.75rem;
    transition: transform 0.2s;
    display: inline-block;
    color: var(--ink-light);
  }
  .sources-h3.closed .sources-arrow { transform: rotate(-90deg); }
  .collapsed { display: none; }

  .source-cb {
    appearance: none;
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(110,175,212,0.6);
    border-radius: 6px;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .source-cb:checked { background: var(--teal); border-color: var(--teal); }
  .source-cb:checked::after {
    content: '✓';
    position: absolute;
    top: -3px; left: 1px;
    font-size: 12px;
    color: white;
    font-weight: 900;
    line-height: 1;
  }

  .hidden-source { display: none !important; }

  #last-scraped {
    font-family: 'Caveat', cursive;
    font-size: 0.9rem;
    color: var(--ink-light);
    text-align: center;
    margin-top: 8px;
  }

  /* Loading / empty states */
  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--sky-deep);
  }
  .no-events {
    text-align: center;
    padding: 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--ink-light);
  }

  /* Date group header */
  .date-group-header {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.08rem;
    color: var(--ink);
    background: rgba(200,232,248,0.45);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 12px 5px 16px;
    border-radius: 22px;
    margin: 10px 0 4px;
    border: 1px solid rgba(136,196,225,0.3);
  }
  .date-next-btn {
    background: none;
    border: none;
    color: var(--ink-light);
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0 6px;
    opacity: 0.55;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .date-next-btn:hover { opacity: 1; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--ink);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 12px 20px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(58,80,104,0.25);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;position:relative;z-index:1">

    <!-- Kid with balloon — softer illustrated style -->
    <svg width="68" height="92" viewBox="0 0 68 92" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform:scaleX(-1)">
      <!-- balloon -->
      <circle cx="10" cy="46" r="9" fill="#C4B5E8" stroke="#3A5068" stroke-width="1.8"/>
      <line x1="10" y1="55" x2="10" y2="60" stroke="#3A5068" stroke-width="1.4"/>
      <!-- body -->
      <ellipse cx="34" cy="57" rx="13" ry="17" fill="#F2AABB" stroke="#3A5068" stroke-width="2"/>
      <!-- head -->
      <circle cx="34" cy="29" r="13" fill="#F5D5B0" stroke="#3A5068" stroke-width="2"/>
      <!-- hair -->
      <path d="M21 24 Q34 12 47 24" fill="#E8956A" stroke="#3A5068" stroke-width="1.8"/>
      <!-- eyes -->
      <circle cx="29" cy="27" r="2.2" fill="#3A5068"/>
      <circle cx="39" cy="27" r="2.2" fill="#3A5068"/>
      <!-- smile -->
      <path d="M28 34 Q34 39 40 34" stroke="#3A5068" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- arms -->
      <line x1="21" y1="54" x2="9"  y2="62" stroke="#F5D5B0" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="47" y1="54" x2="60" y2="60" stroke="#F5D5B0" stroke-width="4.5" stroke-linecap="round"/>
      <!-- legs -->
      <line x1="28" y1="73" x2="24" y2="89" stroke="#7ECEC4" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="40" y1="73" x2="44" y2="89" stroke="#7ECEC4" stroke-width="4.5" stroke-linecap="round"/>
    </svg>

    <div>
      <div class="site-title">🎉 Funtastic Weekend!</div>
      <div class="site-subtitle">Aina's fun guide for the summer</div>
    </div>

    <!-- Sun with soft illustrated feel -->
    <svg width="68" height="76" viewBox="0 0 68 76" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- soft rays -->
      <line x1="34" y1="4"  x2="34" y2="13" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="34" y1="52" x2="34" y2="61" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="4"  y1="32" x2="13" y2="32" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="32" x2="64" y2="32" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="11" y1="11" x2="17" y2="17" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="51" y1="47" x2="57" y2="53" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="57" y1="11" x2="51" y2="17" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="17" y1="47" x2="11" y2="53" stroke="#F4A875" stroke-width="2.5" stroke-linecap="round"/>
      <!-- sun face -->
      <circle cx="34" cy="32" r="16" fill="#F9D76B" stroke="#3A5068" stroke-width="2"/>
      <circle cx="28" cy="30" r="2"  fill="#3A5068"/>
      <circle cx="40" cy="30" r="2"  fill="#3A5068"/>
      <path d="M27 37 Q34 43 41 37" stroke="#3A5068" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>

  </div>

  <!-- soft cloud bottom edge -->
  <div class="header-bottom">
    <svg viewBox="0 0 1440 36" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 36 C180 10 360 36 540 20 C720 4 900 36 1080 18 C1260 0 1350 36 1440 20 L1440 36 Z" fill="#FEF6ED"/>
    </svg>
  </div>
</header>

<!-- ── Deco strip ── -->
<div class="deco-strip">
  <!-- soft star -->
  <svg viewBox="0 0 48 48"><path d="M24 4 L28 18 L43 18 L31 27 L35 41 L24 33 L13 41 L17 27 L5 18 L20 18 Z" fill="#F9D76B" stroke="#3A5068" stroke-width="1.5" stroke-linejoin="round"/></svg>
  <!-- soft butterfly -->
  <svg viewBox="0 0 48 48"><ellipse cx="16" cy="20" rx="11" ry="8" fill="#F2AABB" stroke="#3A5068" stroke-width="1.5" transform="rotate(-18 16 20)"/><ellipse cx="32" cy="20" rx="11" ry="8" fill="#C4B5E8" stroke="#3A5068" stroke-width="1.5" transform="rotate(18 32 20)"/><ellipse cx="18" cy="31" rx="7" ry="5.5" fill="#F4A875" stroke="#3A5068" stroke-width="1.5" transform="rotate(18 18 31)"/><ellipse cx="30" cy="31" rx="7" ry="5.5" fill="#7ECEC4" stroke="#3A5068" stroke-width="1.5" transform="rotate(-18 30 31)"/><line x1="24" y1="15" x2="24" y2="37" stroke="#3A5068" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="26" r="2.5" fill="#3A5068"/></svg>
  <!-- flower -->
  <svg viewBox="0 0 48 48"><circle cx="24" cy="16" r="5.5" fill="#F2AABB" stroke="#3A5068" stroke-width="1.2"/><circle cx="35" cy="22" r="5.5" fill="#F4A875" stroke="#3A5068" stroke-width="1.2"/><circle cx="32" cy="34" r="5.5" fill="#C4B5E8" stroke="#3A5068" stroke-width="1.2"/><circle cx="16" cy="34" r="5.5" fill="#7ECEC4" stroke="#3A5068" stroke-width="1.2"/><circle cx="13" cy="22" r="5.5" fill="#F9D76B" stroke="#3A5068" stroke-width="1.2"/><circle cx="24" cy="24" r="7" fill="#F9D76B" stroke="#3A5068" stroke-width="1.5"/><line x1="24" y1="31" x2="24" y2="46" stroke="#9DC88D" stroke-width="2.5" stroke-linecap="round"/></svg>
  <!-- kite -->
  <svg viewBox="0 0 48 48"><path d="M24 4 L40 24 L24 38 L8 24 Z" fill="#7ECEC4" stroke="#3A5068" stroke-width="1.5" stroke-linejoin="round"/><line x1="24" y1="4"  x2="24" y2="38" stroke="#3A5068" stroke-width="1.2"/><line x1="8"  y1="24" x2="40" y2="24" stroke="#3A5068" stroke-width="1.2"/><path d="M24 38 Q28 42 26 46 Q22 48 24 44" stroke="#F2AABB" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
  <!-- rainbow -->

<!-- Toast -->

<script>
const API = '';

async function loadEvents() {
  const params = new URLSearchParams();
  const q = document.getElementById('search-input').value.trim();
  const date = document.getElementById('date-filter').value;
  const source = document.getElementById('source-filter').value;
  const region = document.getElementById('region-filter').value;
  if (q) params.set('q', q);
  if (date && !q) params.set('date', date);
  if (source) params.set('source', source);
  if (region) params.set('region', region);

  document.getElementById('events-list').innerHTML = '<div class="loading">Loading fun… 🌈</div>';

  try {
    const res = await fetch(`/api/events?${params}`);
    const { events, lastScraped } = await res.json();

    let nextEvent = null;
    const date = document.getElementById('date-filter').value;
    if (!events.length && source && date) {
      const nextParams = new URLSearchParams({ source });
      const nextRes = await fetch(`/api/events?${nextParams}`);
      const { events: nextEvents } = await nextRes.json();
      nextEvent = nextEvents[0] || null;
    }

    renderEvents(events, nextEvent);
    if (lastScraped) {
      document.getElementById('last-scraped').textContent =
        'Last updated: ' + new Date(lastScraped).toLocaleString();
    }
  } catch (e) {
    document.getElementById('events-list').innerHTML = '<div class="no-events">Oops! Could not load events 😢</div>';
  }
}

function renderEvents(events, nextEvent) {
  const countEl = document.getElementById('events-count');
  const listEl  = document.getElementById('events-list');
  countEl.textContent = `🎡 ${events.length} upcoming event${events.length !== 1 ? 's' : ''} found!`;

  if (!events.length) {
    if (nextEvent) {
      const label = nextEvent.date ? formatDateHeader(nextEvent.date) : 'an upcoming date';
      listEl.innerHTML = `<div class="no-events">No events found on the selected date.<br>
        <a href="#" onclick="jumpToEvent(event, '${escHtml(nextEvent.date)}', '${escHtml(nextEvent.id)}')" style="color:var(--sky-deep);font-size:0.95rem">
          Jump to next available: ${escHtml(nextEvent.title)} — ${label}
        </a></div>`;
    } else {
      const noEventsEl = document.createElement('div');
      noEventsEl.className = 'no-events';
      const dateVal = document.getElementById('date-filter').value;
      noEventsEl.textContent = dateVal ? 'No events found for that day!' : 'No upcoming events found! Try different filters 🔍';
      listEl.appendChild(noEventsEl);
    }
    return;
  }

  const groups = {};
  const noDate = [];
  events.forEach(ev => {
    if (ev.date) { (groups[ev.date] = groups[ev.date] || []).push(ev); }
    else noDate.push(ev);
  });

  const html = [];
  const sortedDates = Object.keys(groups).sort();
  sortedDates.forEach(d => {
    const label = formatDateHeader(d);
    const nextBtn = `<button class="date-next-btn" onclick="nextDay('${d}')" title="Next day">▶</button>`;
    html.push(`<div class="date-group-header"><span>📅 ${label}</span>${nextBtn}</div>`);
    groups[d].forEach(ev => html.push(eventCard(ev)));
  });
  if (noDate.length) {
    html.push('<div class="date-group-header">📌 Date TBD</div>');
    noDate.forEach(ev => html.push(eventCard(ev)));
  }
  listEl.innerHTML = html.join('');
  filterBySources();
}

function formatDateHeader(iso) {
  const d = new Date(iso + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function eventCard(ev) {
  const title = ev.url
    ? `<a href="${escHtml(ev.url)}" target="_blank" rel="noopener">${escHtml(ev.title)}</a>`
    : escHtml(ev.title);
  const REGION_EMOJI = {'San Francisco':'🌉','North Bay':'🌲','East Bay':'🏔️','Peninsula':'🌊','South Bay':'☀️'};
  const dateBadge   = ev.date    ? `<span class="tag tag-date">📅 ${ev.date}</span>` : '';
  const locBadge    = ev.location? `<span class="tag tag-location">📍 ${escHtml(ev.location)}</span>` : '';
  const regionBadge = ev.region  ? `<span class="tag tag-region">${REGION_EMOJI[ev.region] || '📌'} ${escHtml(ev.region)}</span>` : '';
  const srcBadge    = `<span class="tag tag-source">🔗 ${escHtml(ev.source)}</span>`;
  const desc        = ev.description ? `<div class="event-desc">${escHtml(ev.description)}</div>` : '';
  const gcalUrl     = buildGcalUrl(ev);
  return `
    <div class="event-card" data-source="${escHtml(ev.source)}" data-id="${escHtml(ev.id)}">
      <div class="event-header">
        <div class="event-title">${title}</div>
      </div>
      <div class="event-meta">${dateBadge}${regionBadge}${locBadge}${srcBadge}</div>
      ${desc}
      <div class="event-actions">
        <a class="btn-gcal" href="${gcalUrl}" target="_blank" rel="noopener" title="Add to Google Calendar">📅 Add to Calendar</a>
        <button class="btn-delete" onclick="deleteEvent('${ev.id}')" title="Remove">✕</button>
      </div>
    </div>`;
}

function buildGcalUrl(ev) {
  const base = 'https://calendar.google.com/calendar/render?action=TEMPLATE';
  const text = encodeURIComponent(ev.title || '');
  const details = encodeURIComponent((ev.description || '') + (ev.url ? '\n' + ev.url : ''));
  const location = encodeURIComponent(ev.location || '');
  const date = ev.date ? ev.date.replace(/-/g, '') : '';
  const dates = date ? `${date}/${date}` : '';
  return `${base}&text=${text}&details=${details}&location=${location}${dates ? '&dates=' + dates : ''}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function deleteEvent(id) {
  if (!confirm('Remove this event?')) return;
  await fetch(`/api/events/${id}`, { method: 'DELETE' });
  toast('Event removed!');
  loadEvents();
}

async function triggerScrape() {
  toast('Scraping sources… this may take a minute 🕷️');
  const res = await fetch('/api/scrape', { method: 'POST' });
  const { count } = await res.json();
  toast(`Scraped ${count} events! 🎉`);
  loadEvents();
}

function jumpToEvent(e, date, id) {
  e.preventDefault();
  if (date) document.getElementById('date-filter').value = date;
  loadEvents().then(() => {
    const el = document.querySelector(`.event-card[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

function nextDay(iso) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  document.getElementById('date-filter').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  loadEvents();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function togglePanel(panelId, headerId) {
  const panel = document.getElementById(panelId);
  const header = document.getElementById(headerId);
  const isCollapsed = panel.classList.toggle('collapsed');
  header.classList.toggle('closed', isCollapsed);
}

function filterBySources() {
  const checked = new Set(
    [...document.querySelectorAll('.source-cb:checked')].map(cb => cb.dataset.source)
  );
  document.querySelectorAll('.event-card').forEach(card => {
    card.classList.toggle('hidden-source', !checked.has(card.dataset.source));
  });
  document.querySelectorAll('.date-group-header').forEach(header => {
    let sibling = header.nextElementSibling;
    let allHidden = true;
    while (sibling && !sibling.classList.contains('date-group-header')) {
      if (!sibling.classList.contains('hidden-source')) { allHidden = false; break; }
      sibling = sibling.nextElementSibling;
    }
    header.classList.toggle('hidden-source', allHidden);
  });
  const visible = document.querySelectorAll('.event-card:not(.hidden-source)').length;
  document.getElementById('events-count').textContent = `🎡 ${visible} event${visible !== 1 ? 's' : ''} found!`;
}

// Live search
let debounce;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(loadEvents, 400);
});
document.getElementById('date-filter').addEventListener('change', loadEvents);
document.getElementById('region-filter').addEventListener('change', loadEvents);
document.getElementById('source-filter').addEventListener('change', loadEvents);

// Initial load
const _now = new Date();
document.getElementById('date-filter').value = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
loadEvents();
</script>
